<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QUICK ADMIN</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d0d0d;--bg2:#161616;--bg3:#1e1e1e;--bg4:#252525;--bg5:#2d2d2d;
  --accent:#f0b429;--accent2:#d99e20;
  --text:#f0f0f0;--text2:#999;--text3:#555;
  --green:#27ae60;--red:#e74c3c;--blue:#2980b9;--purple:#8e44ad;
  --toss:#0064ff;--grab:#00b14f;
  --border:#222;--radius:10px;
  --c-dev:#e74c3c;--c-master:#f0b429;--c-branch:#3498db;--c-sub:#2ecc71;
}
body{font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
button,input,select,textarea{font-family:inherit}
#login-page{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:36px 32px;width:400px}
.login-header{text-align:center;margin-bottom:28px}
.login-icon{width:52px;height:52px;background:var(--accent);border-radius:13px;display:inline-flex;align-items:center;justify-content:center;font-weight:800;font-size:24px;color:#000;margin-bottom:12px}
.login-header h2{font-size:20px;font-weight:700}
.login-header p{font-size:11px;color:var(--text2);letter-spacing:1px;margin-top:3px}
.fgroup{margin-bottom:13px}
.fgroup label{font-size:11px;color:var(--text2);display:block;margin-bottom:5px;font-weight:600}
.finput{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:13px;outline:none;transition:.2s}
.finput:focus{border-color:var(--accent)}
select.finput option{background:var(--bg3)}
.btn-main{width:100%;background:var(--accent);color:#000;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;margin-top:6px;transition:.15s}
.btn-main:hover{background:var(--accent2)}
.btn-main:disabled{opacity:.6;cursor:wait}
#app{display:none;height:100vh;overflow:hidden}
.layout{display:flex;height:100vh}
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sb-top{padding:16px 12px 12px;border-bottom:1px solid var(--border)}
.sb-logo{display:flex;align-items:center;gap:8px}
.sb-icon{width:32px;height:32px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#000;flex-shrink:0}
.sb-txt h3{font-size:13px;font-weight:700}.sb-txt span{font-size:10px;color:var(--text2);letter-spacing:.4px}
.role-tag{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:6px;font-size:11px;font-weight:700;margin-top:10px;width:100%}
.role-dev{background:rgba(231,76,60,.15);color:var(--c-dev);border:1px solid rgba(231,76,60,.2)}
.role-master{background:rgba(240,180,41,.15);color:var(--c-master);border:1px solid rgba(240,180,41,.2)}
.role-branch{background:rgba(52,152,219,.15);color:var(--c-branch);border:1px solid rgba(52,152,219,.2)}
.role-sub{background:rgba(46,204,113,.15);color:var(--c-sub);border:1px solid rgba(46,204,113,.2)}
.rdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.rdot.dev{background:var(--c-dev)}.rdot.master{background:var(--c-master)}.rdot.branch{background:var(--c-branch)}.rdot.sub{background:var(--c-sub)}
.sb-user{padding:10px 12px;font-size:12px;color:var(--text2);border-bottom:1px solid var(--border)}
.sb-user strong{color:var(--text);display:block;font-size:13px;margin-bottom:1px}
.sb-nav{flex:1;padding:10px 8px;overflow-y:auto}
.nsl{font-size:10px;color:var(--text3);font-weight:700;letter-spacing:.8px;padding:8px 8px 3px;text-transform:uppercase}
.ni{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;cursor:pointer;transition:.12s;font-size:12px;color:var(--text2);margin-bottom:1px;user-select:none}
.ni:hover{background:var(--bg3);color:var(--text)}.ni.active{background:var(--accent);color:#000;font-weight:700}
.ni svg{width:14px;height:14px;flex-shrink:0}
.sb-bot{padding:10px 8px;border-top:1px solid var(--border)}
.logout-ni{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;cursor:pointer;font-size:12px;color:var(--text2);transition:.12s}
.logout-ni:hover{background:rgba(231,76,60,.1);color:var(--red)}
.main-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;height:46px;flex-shrink:0}
.ptab{padding:0 16px;height:46px;display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;color:var(--text2);transition:.15s;white-space:nowrap}
.ptab:hover{color:var(--text)}.ptab.at-all{color:var(--accent);border-bottom-color:var(--accent)}.ptab.at-toss{color:var(--toss);border-bottom-color:var(--toss)}.ptab.at-grab{color:var(--grab);border-bottom-color:var(--grab)}
.pdot{width:7px;height:7px;border-radius:50%}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.sys-ok{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--green);background:rgba(39,174,96,.1);border:1px solid rgba(39,174,96,.2);padding:4px 10px;border-radius:12px}
.sys-err{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--red);background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.2);padding:4px 10px;border-radius:12px}
.sysdot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
.sysdot.err{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.content{flex:1;overflow-y:auto;padding:22px 24px}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.ph{margin-bottom:20px;display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:8px}
.ph h1{font-size:22px;font-weight:700}.ph p{font-size:12px;color:var(--text2);margin-top:3px}
.sgrid{display:grid;gap:10px;margin-bottom:16px}
.sg4{grid-template-columns:repeat(4,1fr)}.sg3{grid-template-columns:repeat(3,1fr)}.sg2{grid-template-columns:repeat(2,1fr)}
.scard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.scard-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.slabel{font-size:11px;color:var(--text2)}.sicon{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px}
.sval{font-size:24px;font-weight:700;line-height:1}.ssub{font-size:10px;color:var(--text3);margin-top:3px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius)}
.card-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:13px;font-weight:600}.card-body{padding:16px}
.cgrid{display:grid;grid-template-columns:1fr 360px;gap:14px;margin-bottom:16px}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{font-size:10px;color:var(--text3);font-weight:700;text-align:left;padding:7px 10px;border-bottom:1px solid var(--border);letter-spacing:.3px;white-space:nowrap}
td{padding:9px 10px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle}
tr:last-child td{border-bottom:none}tr:hover td{background:rgba(255,255,255,.015)}
.minfo{display:flex;align-items:center;gap:8px}
.mavatar{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.mname{font-size:12px;font-weight:600}.mid{font-size:10px;color:var(--text3)}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:700;white-space:nowrap}
.bg-green{background:rgba(39,174,96,.15);color:#27ae60}.bg-yellow{background:rgba(240,180,41,.15);color:#f0b429}.bg-red{background:rgba(231,76,60,.15);color:#e74c3c}
.bg-blue{background:rgba(41,128,185,.15);color:#2980b9}.bg-purple{background:rgba(142,68,173,.15);color:#8e44ad}.bg-gray{background:rgba(255,255,255,.07);color:var(--text2)}
.bg-toss{background:rgba(0,100,255,.15);color:var(--toss)}.bg-grab{background:rgba(0,177,79,.15);color:var(--grab)}
.bg-dev{background:rgba(231,76,60,.12);color:var(--c-dev)}.bg-master{background:rgba(240,180,41,.12);color:var(--c-master)}.bg-branch{background:rgba(52,152,219,.12);color:var(--c-branch)}.bg-sub{background:rgba(46,204,113,.12);color:var(--c-sub)}
.btn{padding:7px 13px;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;border:none;transition:.13s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.btn-p{background:var(--accent);color:#000}.btn-p:hover{background:var(--accent2)}
.btn-g{background:transparent;color:var(--text2);border:1px solid var(--border)}.btn-g:hover{background:var(--bg3);color:var(--text)}
.btn-d{background:rgba(231,76,60,.12);color:var(--red);border:1px solid rgba(231,76,60,.18)}.btn-d:hover{background:rgba(231,76,60,.22)}
.btn-s{background:rgba(39,174,96,.12);color:var(--green);border:1px solid rgba(39,174,96,.18)}.btn-s:hover{background:rgba(39,174,96,.22)}
.btn-b{background:rgba(41,128,185,.12);color:var(--blue);border:1px solid rgba(41,128,185,.18)}.btn-b:hover{background:rgba(41,128,185,.22)}
.btn-sm{padding:4px 9px;font-size:10px}
.fbar{display:flex;align-items:center;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.fbtn{padding:5px 12px;border-radius:15px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-size:11px;cursor:pointer;transition:.13s;font-family:inherit}
.fbtn:hover,.fbtn.on{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700}
.sbox{margin-left:auto;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:6px 10px;color:var(--text);font-size:11px;outline:none;width:200px}
.sbox:focus{border-color:var(--accent)}
.cb{width:15px;height:15px;accent-color:var(--accent);cursor:pointer}
.bulk-bar{display:none;align-items:center;gap:10px;background:rgba(240,180,41,.07);border:1px solid rgba(240,180,41,.18);border-radius:8px;padding:9px 14px;margin-bottom:10px}
.bulk-bar.show{display:flex}.bulk-cnt{font-size:12px;font-weight:700;color:var(--accent)}
.ss{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px}
.ssh{display:flex;align-items:center;gap:9px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.ssi{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px}
.sst{font-size:13px;font-weight:700}.sss{font-size:11px;color:var(--text2);margin-top:1px}
.fg{margin-bottom:14px}
.fl{font-size:11px;color:var(--text2);margin-bottom:5px;display:block;font-weight:600}
.fd{font-size:10px;color:var(--text3);margin-bottom:5px}
.fi2{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:9px 12px;color:var(--text);font-size:12px;outline:none;transition:.2s}
.fi2:focus{border-color:var(--accent)}
.toggle{width:40px;height:22px;border-radius:11px;background:var(--bg5);border:none;cursor:pointer;position:relative;transition:.2s;flex-shrink:0}
.toggle.on{background:var(--accent)}
.toggle::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:3px;left:3px;transition:.2s}
.toggle.on::after{left:21px}
.trow{display:flex;align-items:center;justify-content:space-between;padding:9px 0}
.oc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
.och{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.och:hover{background:var(--bg3)}
.on2{font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.om{font-size:11px;color:var(--text2);margin-top:2px}
.ochildren{padding:8px 16px 14px;border-top:1px solid var(--border)}
.ci{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--bg3);border-radius:7px;margin-top:8px;flex-wrap:wrap;gap:6px}
.cl{display:flex;align-items:center;gap:8px}
.cn{font-size:12px;font-weight:600}.cm{font-size:10px;color:var(--text2)}
.gcw{padding-left:16px;margin-top:6px}
.gci{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--bg4);border-radius:6px;margin-bottom:5px;flex-wrap:wrap;gap:4px}
.cal-wrap{display:inline-block}
.cal-inp{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:7px 10px;color:var(--text);font-size:12px;cursor:pointer;width:120px;outline:none}
.cal-dropdown{display:none;position:fixed;z-index:500;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px;width:250px;box-shadow:0 8px 32px rgba(0,0,0,.7)}
.cal-dropdown.open{display:block}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cal-nb{background:none;border:1px solid var(--border);border-radius:5px;color:var(--text2);cursor:pointer;padding:3px 8px;font-size:12px}
.cal-nb:hover{background:var(--bg3)}
.cal-ml{font-size:12px;font-weight:700}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dh{font-size:9px;color:var(--text3);font-weight:700;text-align:center;padding:2px 0}
.cal-d{font-size:11px;text-align:center;padding:5px 2px;border-radius:4px;cursor:pointer;transition:.1s}
.cal-d:hover{background:var(--bg3)}.cal-d.today{color:var(--accent);font-weight:700}
.cal-d.selected{background:var(--accent);color:#000;font-weight:700}.cal-d.empty{cursor:default;pointer-events:none}
.cal-presets{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
.cal-pre{background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:3px 7px;font-size:10px;cursor:pointer;color:var(--text2);font-family:inherit}
.cal-pre:hover{background:var(--accent);color:#000;border-color:var(--accent)}
.dev-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--bg3);border-radius:7px;margin-bottom:6px;flex-wrap:wrap;gap:6px}
.dev-num{width:22px;height:22px;border-radius:5px;background:var(--accent);color:#000;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dev-num.extra{background:var(--bg5);color:var(--text2)}
.dev-add-btn{width:100%;background:var(--bg3);border:1px dashed var(--border);border-radius:7px;padding:10px;color:var(--text2);font-size:12px;cursor:pointer;text-align:center;font-family:inherit;margin-top:6px}
.dev-add-btn:hover{border-color:var(--accent);color:var(--accent)}
.ep-banner{display:none;position:fixed;top:0;left:0;right:0;z-index:300;background:rgba(231,76,60,.92);color:#fff;padding:8px 16px;font-size:12px;font-weight:600;align-items:center;justify-content:space-between;gap:10px;backdrop-filter:blur(4px)}
.ep-banner.show{display:flex}
.ep-drv-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:400;align-items:center;justify-content:center}
.ep-drv-bg.show{display:flex}
.ep-drv-box{background:var(--bg2);border:1px solid rgba(231,76,60,.4);border-radius:16px;padding:28px 24px;width:360px;text-align:center}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:24px;width:460px;max-width:94vw;max-height:90vh;overflow-y:auto}
.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.mt{font-size:15px;font-weight:700}
.mc{background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;line-height:1;padding:0}
.alert{padding:10px 14px;border-radius:7px;font-size:12px;display:flex;align-items:flex-start;gap:7px;margin-bottom:12px;line-height:1.5}
.a-green{background:rgba(39,174,96,.09);border:1px solid rgba(39,174,96,.18);color:#27ae60}
.a-yellow{background:rgba(240,180,41,.09);border:1px solid rgba(240,180,41,.18);color:var(--accent)}
.a-blue{background:rgba(41,128,185,.09);border:1px solid rgba(41,128,185,.18);color:var(--blue)}
.a-red{background:rgba(231,76,60,.09);border:1px solid rgba(231,76,60,.18);color:var(--red)}
.dbar-wrap{margin-bottom:10px}
.dbar-label{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px}
.dbar{height:5px;border-radius:3px;background:var(--bg4);overflow:hidden}
.dbar-fill{height:100%;border-radius:3px}
.empty{text-align:center;padding:40px 20px}
.empty-icon{font-size:28px;opacity:.3;margin-bottom:10px}.empty-txt{font-size:12px;color:var(--text3)}
.toast{position:fixed;bottom:24px;right:24px;z-index:9999;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px 18px;font-size:13px;box-shadow:0 4px 16px rgba(0,0,0,.5);transform:translateY(100px);opacity:0;transition:.3s;max-width:90vw}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{border-color:var(--green);color:var(--green)}
.toast.error{border-color:var(--red);color:var(--red)}
.toast.info{border-color:var(--blue);color:var(--blue)}
.loading{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.mob-menu-btn{display:none;background:none;border:none;color:var(--text);cursor:pointer;padding:6px;flex-shrink:0}
.mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:49}
.mob-overlay.show{display:block}
@media(max-width:768px){
  .mob-menu-btn{display:flex;align-items:center;justify-content:center}
  .sidebar{position:fixed;left:-240px;top:0;bottom:0;z-index:50;transition:left .25s;width:240px;overflow-y:auto}
  .sidebar.mob-open{left:0}
  .main-area{width:100vw}
  .topbar{padding:0 10px;gap:4px}
  .ptab{padding:0 10px;font-size:11px}
  .content{padding:14px 12px}
  .sgrid.sg4{grid-template-columns:repeat(2,1fr)}
  .sgrid.sg3{grid-template-columns:repeat(2,1fr)}
  .cgrid{grid-template-columns:1fr}
  .ph{flex-direction:column;gap:8px}
  .ph>div:last-child{display:flex;flex-wrap:wrap;gap:6px}
  .tw{font-size:11px}
  th,td{padding:6px 7px;font-size:11px}
  .modal-box{width:95vw;padding:18px}
  .ep-banner{font-size:11px;padding:6px 10px;flex-wrap:wrap}
  .btn{padding:6px 10px;font-size:10px}
  .btn-sm{padding:3px 7px;font-size:9px}
  .fbar{gap:4px}
  .fbtn{padding:4px 9px;font-size:10px}
  #alert-toggle-btn{padding:3px 8px}
  .oc{overflow:hidden}
  .och{flex-direction:column;align-items:flex-start;gap:8px}
  .ss{padding:14px}
  .sg2{grid-template-columns:1fr}
}
@media(max-width:480px){
  .sgrid.sg4{grid-template-columns:repeat(2,1fr)}
  .sval{font-size:20px}
  h1{font-size:18px!important}
  .tw table{min-width:560px}
}
</style>
</head>
<body>

<div id="login-page">
  <div class="login-card">
    <div class="login-header">
      <div class="login-icon">Q</div>
      <h2>QUICK ADMIN</h2>

// SHA256 비밀번호 해시
async function sha256(text){
  const buf=new TextEncoder().encode(text);
  const h=await crypto.subtle.digest('SHA-256',buf);
  return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// 토스트 알림
function showToast(msg,type){

// 'role' 변수는 시점 전환용 (확인 미리보기), 'realRole' 은 진짜 권한
// 단 — 개발자(dev) 가 아니면 시점 전환 시 자기 권한보다 위로 못 올림 (보안)

// ★ 지점 ID 의 모든 하위 지점 (자기 자신 포함) 가져오기
//   예: 총판 1 → [1, 3, 4, 6, 7, 8, 10] (자기 + 산하 지사 + 산하 지점)
function getDescendantBranchIds(parentId){
  if(parentId==null)return [];
  var result=[parseInt(parentId)];
  var queue=[parseInt(parentId)];
  var safety=100;
  while(queue.length>0 && safety-->0){
    var current=queue.shift();
    branches.filter(b=>b.parent_id===current).forEach(child=>{
      if(result.indexOf(child.id)<0){
        result.push(child.id);
        queue.push(child.id);
      }
    });
  }
  return result;
}

// ★ 현재 시점에 따른 가시 지점 ID 목록
//   dev → null (모두 보임)
//   master/branch/sub → 자기 + 산하 ID 배열
function getVisibleBranchIds(){
  if(role==='dev')return null;  // null = 제한 없음
  // 시점 전환 시: master/branch/sub 시점이면 그 시점의 첫 지점에 속해보기
  // 실제 운영: realBranchId 사용
  // 시점 미리보기: 해당 role 의 첫 branch 사용 (개발자 로그인 시)
  var startId=realBranchId;
  if(realRole==='dev'){
    // 개발자가 시점 전환 한 경우 — 데모용으로 해당 role 의 첫 지점 선택
    var firstByType=branches.find(b=>b.type===role);
    if(firstByType)startId=firstByType.id;
  }
  if(startId==null)return [];
  return getDescendantBranchIds(startId);
}

// ★ 회원이 보이는지 검사
function memberIsVisible(m){
  var vis=getVisibleBranchIds();
  if(vis===null)return true;  // dev 시점 — 모두 보임
  if(m.branch_id==null)return false;
  return vis.indexOf(m.branch_id)>=0;
}

var today=new Date();
function fd(d){return d.getFullYear()+'.'+(d.getMonth()+1).toString().padStart(2,'0')+'.'+d.getDate().toString().padStart(2,'0');}
function pd(s){if(!s)return null;return new Date(s.replace(/\./g,'-'));}
function dl(s){var d=pd(s);if(!d)return null;return Math.ceil((d-today)/86400000);}
function expBadge(s){var n=dl(s);if(n===null)return '';if(n<0)return '<span class="badge bg-red">만료됨</span>';if(n<=3)return '<span class="badge bg-red">D-'+n+'</span>';if(n<=7)return '<span class="badge bg-yellow">D-'+n+'</span>';return '<span class="badge bg-green">D-'+n+'</span>';}

function statusBadge(app){
  if(app==='toss') return '<span class="badge bg-toss" style="font-size:10px">토스앱</span>';
  if(app==='grab') return '<span class="badge bg-grab" style="font-size:10px">그랩앱</span>';
  return '<span class="badge bg-gray" style="font-size:10px">미확인</span>';
}
function ac(id){var c=['#2980b9','#27ae60','#e74c3c','#8e44ad','#f39c12','#16a085','#d35400'];return c[id%c.length];}
function closeModal(id){document.getElementById(id).classList.remove('open');}

function isoToFd(iso){if(!iso)return '';var d=new Date(iso);if(isNaN(d))return '';return fd(d);}
function fdToIso(s){if(!s)return null;var d=pd(s);if(!d||isNaN(d))return null;return d.toISOString();}

async function doLogin(){
  var id=document.getElementById('l-id').value.trim();
  var pw=document.getElementById('l-pw').value;
  var errEl=document.getElementById('login-err');
  var btn=document.getElementById('login-btn');
  if(!id||!pw){errEl.style.display='block';errEl.textContent='아이디와 비밀번호를 입력하세요';return;}
  
  btn.disabled=true;btn.innerHTML='<span class="loading"></span> 로그인 중...';
  errEl.style.display='none';
  
  try{
    const hashedPw=await sha256(pw);
    const {data,error}=await sb.from('admins').select('*').eq('username',id).eq('password',hashedPw).maybeSingle();
    if(error)throw error;
    if(!data){
      errEl.style.display='block';
      errEl.textContent='아이디 또는 비밀번호가 올바르지 않습니다';
      document.getElementById('l-pw').value='';
      btn.disabled=false;btn.textContent='로그인';
      return;
    }
    
    curAcc=data;
    // ★ 실제 권한 저장 (시점 전환과 별개)
    realRole=data.role||'dev';
    realBranchId=data.branch_id||null;
    role=realRole;  // 처음엔 실제 역할 시점으로 시작
    user={name:data.name,id:data.username,orgId:data.branch_id,dbId:data.id};
    
    document.getElementById('login-page').style.display='none';
    document.getElementById('app').style.display='block';
    
    // 데이터 미리 로드
    await loadAllData();
    
    buildSidebar();
    navigate('dashboard');
    setTimeout(checkExpiry,700);
    showToast('로그인 성공: '+data.name,'success');
  }catch(e){
    console.error(e);
    errEl.style.display='block';
    errEl.textContent='서버 연결 실패: '+e.message;
    btn.disabled=false;btn.textContent='로그인';
  }
}

async function loadAllData(){

    // 회원 + 추가 기기 로드

    const {data:deviceData,error:dErr}=await sb.from('user_devices').select('*');

    members=(userData||[]).map(u=>({
      id:u.id,

      residentNum:u.resident_num,

      telegramId:u.telegram_id,
      branch_id:u.branch_id,  // ★ 권한 격리에 필요
      extraSlots:u.extra_phone_slots||0,
      approvedAt:u.approved_at,
      lastLoginAt:u.last_login_at,
      createdAt:u.created_at,
      // 호환성 필드
      orgType:'sub',orgId:'manual',
      devices:[{num:1,label:'1'+(u.real_name||u.username),platform:'toss',fee:0,main:true}].concat(
        (deviceData||[]).filter(d=>d.user_id===u.id).map((d,i)=>({
          id:d.id,
          num:i+2,
          label:d.label||((i+2)+(u.real_name||u.username)),
          platform:'toss',
          fee:DEV_FEE,
          main:false,
          phone_number:d.phone_number
        }))

    // 결제 요청 로드 (회원의 branch_id 도 같이)

      date:isoToFd(p.created_at),
      status:p.status||'pending',
      note:p.note,
      adminNote:p.admin_note,
      orgType:'sub',orgId:'manual'
    }));
    
    // 공지사항 로드
    const {data:noticeData,error:nErr}=await sb.from('announcements').select('*').order('is_pinned',{ascending:false}).order('created_at',{ascending:false});
    if(nErr)throw nErr;

function navigate(pg){

  var ps={
    dashboard:renderDash,

    'my-orgs':renderMyOrgs,

  document.getElementById('page-content').innerHTML=(ps[pg]||function(){return '<div class="empty"><div class="empty-icon">🔧</div><div class="empty-txt">준비 중</div></div>';})();

}

function initChart(){
  var ctx=document.getElementById('salesChart');if(!ctx)return;
  if(chartObj){chartObj.destroy();chartObj=null;}
  // 월별 매출 집계
  var monthly={};
  payments.filter(p=>p.status==='approved').filter(p=>{
    var vis=getVisibleBranchIds();
    if(vis===null)return true;
    if(p.branch_id==null)return false;
    return vis.indexOf(p.branch_id)>=0;
  }).forEach(p=>{
    var d=pd(p.date);if(!d)return;
    var key=d.getFullYear()+'-'+(d.getMonth()+1);
    monthly[key]=(monthly[key]||0)+(p.amount||0);
  });
  var labels=[],vals=[];
  for(var i=5;i>=0;i--){
    var d2=new Date(today.getFullYear(),today.getMonth()-i,1);
    var k=d2.getFullYear()+'-'+(d2.getMonth()+1);
    labels.push((d2.getMonth()+1)+'월');
    vals.push(monthly[k]||0);
  }
  chartObj=new Chart(ctx,{type:'line',data:{labels:labels,datasets:[{label:'매출',data:vals,borderColor:'#f0b429',backgroundColor:'rgba(240,180,41,.07)',tension:.4,fill:true,pointRadius:4,pointBackgroundColor:'#f0b429'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#555',font:{size:10}}},y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#555',font:{size:10},callback:function(v){return '₩'+(v/1000)+'k';}}}}}});
}

function setMF(f){memberFilter=f;navigate('members');}

async function approveM(id){
  if(!confirm('이 회원을 승인하시겠습니까?\n\n승인 시 30일 무료 이용권이 자동 부여됩니다.'))return;
  try{
    const expireAt=new Date(Date.now()+30*86400*1000).toISOString();
    const {error}=await sb.from('users').update({
      status:'approved',
      approved_at:new Date().toISOString(),
      license_expires_at:expireAt,
      is_free_user:true
    }).eq('id',id);
    if(error)throw error;
    showToast('회원이 승인되었습니다','success');
    await loadAllData();
    navigate('members');
  }catch(e){
    showToast('승인 실패: '+e.message,'error');
  }
}

async function rejectM(id){
  var reason=prompt('거절 사유를 입력하세요:','');
  if(reason===null)return;
  try{
    const {error}=await sb.from('users').update({
      status:'rejected',
      rejection_reason:reason||'관리자 거절'
    }).eq('id',id);
    if(error)throw error;
    showToast('회원이 거절되었습니다','success');
    await loadAllData();
    navigate('members');
  }catch(e){
    showToast('거절 실패: '+e.message,'error');
  }
}

async function deleteM(id){
  var m=members.find(x=>x.id===id);if(!m)return;
  if(!confirm(m.name+' (@'+m.username+') 회원을 삭제하시겠습니까?\n\n⚠️ 이 작업은 되돌릴 수 없습니다.\n관련 기기, 결제 요청도 함께 삭제됩니다.'))return;
  try{
    // payment_requests 먼저 삭제 (FK)
    await sb.from('payment_requests').delete().eq('user_id',id);
    // user_devices 삭제 (CASCADE 로 자동 삭제되지만 명시적으로)
    await sb.from('user_devices').delete().eq('user_id',id);
    // users 삭제
    const {error}=await sb.from('users').delete().eq('id',id);
    if(error)throw error;
    showToast('회원이 삭제되었습니다','success');
    await loadAllData();
    navigate('members');
  }catch(e){
    showToast('삭제 실패: '+e.message,'error');
  }
}

var CAL={mid:null,y:today.getFullYear(),m:today.getMonth()};
function openCal(mid){
  document.querySelectorAll('.cal-dropdown.open').forEach(function(d){d.classList.remove('open');});
  CAL.mid=mid;
  var mb=members.find(function(x){return x.id===mid;});
  if(mb&&mb.expire){var d=pd(mb.expire);if(d){CAL.y=d.getFullYear();CAL.m=d.getMonth();}}
  else{CAL.y=today.getFullYear();CAL.m=today.getMonth();}
  var dd=document.getElementById('cdd-'+mid);
  var inp=document.getElementById('exp-'+mid);
  if(dd&&inp){
    renderCal(mid);
    dd.classList.add('open');
    var rect=inp.getBoundingClientRect();
    var winH=window.innerHeight,winW=window.innerWidth;
    var dropH=290,dropW=250;
    var top=rect.bottom+4;
    var left=rect.left;
    if(top+dropH>winH)top=rect.top-dropH-4;
    if(left+dropW>winW)left=winW-dropW-8;
    if(left<4)left=4;
    dd.style.top=top+'px';
    dd.style.left=left+'px';
  }
}
function renderCal(mid){
  var dd=document.getElementById('cdd-'+mid);if(!dd)return;
  var mb=members.find(function(x){return x.id===mid;});
  var sel=mb?mb.expire:'';
  var mn=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  var firstDay=new Date(CAL.y,CAL.m,1).getDay();
  var daysInMonth=new Date(CAL.y,CAL.m+1,0).getDate();
  var ty=today.getFullYear(),tm=today.getMonth(),td=today.getDate();
  var h='<div class="cal-nav"><button class="cal-nb" type="button" onclick="event.stopPropagation();calPrev('+mid+')">&#8249;</button><span class="cal-ml">'+CAL.y+'년 '+mn[CAL.m]+'</span><button class="cal-nb" type="button" onclick="event.stopPropagation();calNext('+mid+')">&#8250;</button></div><div class="cal-grid">';
  ['일','월','화','수','목','금','토'].forEach(function(d){h+='<div class="cal-dh">'+d+'</div>';});
  for(var i=0;i<firstDay;i++)h+='<div class="cal-d empty"></div>';
  for(var d=1;d<=daysInMonth;d++){
    var ds=CAL.y+'.'+(CAL.m+1).toString().padStart(2,'0')+'.'+d.toString().padStart(2,'0');
    var isT=(CAL.y===ty&&CAL.m===tm&&d===td),isS=(sel===ds);
    h+='<div class="cal-d'+(isT?' today':'')+(isS?' selected':'')+'" onclick="pickDate('+mid+',\''+ds+'\')">'+d+'</div>';
  }
  h+='</div><div class="cal-presets">';
  [7,14,30,40,60,90].forEach(function(n){h+='<button class="cal-pre" type="button" onclick="event.stopPropagation();addDaysLic('+mid+','+n+')">+'+n+'일</button>';});
  h+='</div>';
  dd.innerHTML=h;
}
function calPrev(mid){CAL.m--;if(CAL.m<0){CAL.m=11;CAL.y--;}renderCal(mid);}
function calNext(mid){CAL.m++;if(CAL.m>11){CAL.m=0;CAL.y++;}renderCal(mid);}

async function pickDate(mid,ds){
  var m=members.find(function(x){return x.id===mid;});if(!m)return;
  var dd=document.getElementById('cdd-'+mid);if(dd)dd.classList.remove('open');
  var inp=document.getElementById('exp-'+mid);if(inp)inp.value=ds;
  // Supabase 업데이트
  try{
    const iso=fdToIso(ds);
    const {error}=await sb.from('users').update({license_expires_at:iso}).eq('id',mid);
    if(error)throw error;
    m.expire=ds;
    showToast('만료일 변경 완료: '+ds,'success');
    navigate('license');
  }catch(e){
    showToast('만료일 변경 실패: '+e.message,'error');
  }
}
function addDaysLic(mid,n){
  var m=members.find(function(x){return x.id===mid;});if(!m)return;
  var base=m.expire?pd(m.expire):new Date(today);
  if(!base)base=new Date(today);
  base.setDate(base.getDate()+n);
  pickDate(mid,fd(base));
}

  }
});

async function approveP(id){
  var p=payments.find(x=>x.id===id);if(!p)return;
  if(!confirm('₩'+(p.amount||0).toLocaleString()+' 결제를 승인하시겠습니까?\n\n승인 시 회원의 이용권이 30일 연장됩니다.'))return;
  try{
    // 결제 승인
    const {error:pe}=await sb.from('payment_requests').update({
      status:'approved',
      approved_amount:p.amount,
      processed_at:new Date().toISOString()
    }).eq('id',id);
    if(pe)throw pe;
    
    // 회원 만료일 30일 연장
    var m=members.find(x=>x.id===p.userId);
    if(m){
      var base=m.expire?pd(m.expire):new Date();
      if(!base||isNaN(base))base=new Date();
      if(base<new Date())base=new Date(); // 이미 만료된 경우 오늘부터
      base.setDate(base.getDate()+30);
      const {error:ue}=await sb.from('users').update({
        license_expires_at:base.toISOString(),
        is_free_user:false
      }).eq('id',p.userId);
      if(ue)throw ue;
    }
    
    showToast('결제 승인 + 이용권 30일 연장 완료','success');
    await loadAllData();
    navigate('payment');
  }catch(e){
    showToast('승인 실패: '+e.message,'error');
  }
}

async function rejectP(id){
  var note=prompt('거절 사유:','');
  if(note===null)return;
  try{
    const {error}=await sb.from('payment_requests').update({
      status:'rejected',
      admin_note:note||'관리자 거절',
      processed_at:new Date().toISOString()
    }).eq('id',id);
    if(error)throw error;
    showToast('결제 거절 완료','success');
    await loadAllData();
    navigate('payment');
  }catch(e){
    showToast('거절 실패: '+e.message,'error');
  }
}

function openNoticeModal(){
  document.getElementById('notice-id').value='';
  document.getElementById('notice-title').value='';
  document.getElementById('notice-content').value='';
  document.getElementById('notice-category').value='notice';
  document.getElementById('notice-pinned').checked=false;
  document.getElementById('notice-published').checked=true;
  document.getElementById('notice-modal-title').textContent='공지 작성';
  document.getElementById('modal-notice').classList.add('open');
}

function editNotice(id){
  var n=notices.find(x=>x.id===id);if(!n)return;
  document.getElementById('notice-id').value=n.id;
  document.getElementById('notice-title').value=n.title;
  document.getElementById('notice-content').value=n.content;
  document.getElementById('notice-category').value=n.category||'notice';
  document.getElementById('notice-pinned').checked=!!n.is_pinned;
  document.getElementById('notice-published').checked=!!n.is_published;
  document.getElementById('notice-modal-title').textContent='공지 수정';
  document.getElementById('modal-notice').classList.add('open');
}

async function saveNotice(){
  var id=document.getElementById('notice-id').value;
  var title=document.getElementById('notice-title').value.trim();
  var content=document.getElementById('notice-content').value.trim();
  var category=document.getElementById('notice-category').value;
  var pinned=document.getElementById('notice-pinned').checked;
  var published=document.getElementById('notice-published').checked;
  if(!title||!content){showToast('제목과 내용을 입력하세요','error');return;}
  try{
    var payload={title:title,content:content,category:category,is_pinned:pinned,is_published:published,updated_at:new Date().toISOString()};
    var error;
    if(id){
      ({error}=await sb.from('announcements').update(payload).eq('id',id));
    }else{
      ({error}=await sb.from('announcements').insert(payload));
    }
    if(error)throw error;
    closeModal('modal-notice');
    showToast(id?'공지 수정 완료':'공지 등록 완료','success');
    await loadAllData();
    navigate('notices');
  }catch(e){
    showToast('저장 실패: '+e.message,'error');
  }
}

async function deleteNotice(id){
  if(!confirm('이 공지를 삭제하시겠습니까?'))return;
  try{
    const {error}=await sb.from('announcements').delete().eq('id',id);
    if(error)throw error;
    showToast('공지가 삭제되었습니다','success');
    await loadAllData();
    navigate('notices');
  }catch(e){
    showToast('삭제 실패: '+e.message,'error');
  }
}

// =====================================================================
//   REVENUE — 매출 현황 (권한별 산하 매출 합계)
// =====================================================================
function renderRevenue(){
  var vis=getVisibleBranchIds();
  
  // 회원별 매출 (결제 매출)
  var memberRevenue={};
  payments.filter(p=>p.status==='approved').forEach(p=>{
    if(!p.branch_id)return;
    memberRevenue[p.branch_id]=(memberRevenue[p.branch_id]||0)+(p.amount||0);
  });
  
  // 지점별 회원 수
  var memberCntByBranch={};
  members.forEach(m=>{
    if(m.branch_id)memberCntByBranch[m.branch_id]=(memberCntByBranch[m.branch_id]||0)+1;
  });
  
  // 산하 합계 계산
  function calcBranchTotal(b){
    var ids=getDescendantBranchIds(b.id);
    var revSum=0,memCnt=0,paySum=0;
    ids.forEach(id=>{
      var node=branches.find(x=>x.id===id);
      if(node)revSum+=parseFloat(node.revenue||0);
      memCnt+=(memberCntByBranch[id]||0);
      paySum+=(memberRevenue[id]||0);
    });
    return {revSum:revSum,memCnt:memCnt,paySum:paySum,total:revSum+paySum};
  }
  
  var visBranches=vis===null?branches:branches.filter(b=>vis.indexOf(b.id)>=0);
  var totalRev=visBranches.reduce((s,b)=>s+parseFloat(b.revenue||0),0);
  var totalPay=Object.keys(memberRevenue).filter(bid=>vis===null||vis.indexOf(parseInt(bid))>=0).reduce((s,bid)=>s+memberRevenue[bid],0);
  
  var titleMap={dev:'전체 매출 현황',master:'본인 + 산하 매출',branch:'본인 + 산하 지점 매출',sub:'내 매출'};
  var html='<div class="ph"><div><h1>'+(titleMap[role]||'매출')+'</h1><p>총 매출 = 직접 매출 + 결제 매출</p></div></div>';
  
  // 합계 카드
  html+='<div class="sgrid sg3" style="margin-bottom:14px">'
    +'<div class="scard" style="border-top:2px solid var(--accent)"><div class="scard-top"><div class="slabel">총 매출</div><div class="sicon" style="background:rgba(240,180,41,.12);color:var(--accent)">📊</div></div><div class="sval" style="color:var(--accent)">₩'+(totalRev+totalPay).toLocaleString()+'</div></div>'
    +'<div class="scard"><div class="scard-top"><div class="slabel">직접 매출 (지점별)</div><div class="sicon" style="background:rgba(46,204,113,.12);color:var(--green)">💰</div></div><div class="sval" style="color:var(--green)">₩'+totalRev.toLocaleString()+'</div></div>'
    +'<div class="scard"><div class="scard-top"><div class="slabel">결제 매출 (이용권)</div><div class="sicon" style="background:rgba(41,128,185,.12);color:var(--blue)">💳</div></div><div class="sval" style="color:var(--blue)">₩'+totalPay.toLocaleString()+'</div></div>'
    +'</div>';
  
  if(visBranches.length===0){
    html+='<div class="empty"><div class="empty-icon">📊</div><div class="empty-txt">집계할 매출 데이터가 없습니다</div></div>';
    return html;
  }
  
  // 지점 시점은 본인만
  if(role==='sub'){
    var me=branches.find(b=>vis&&vis[0]===b.id);
    if(me){
      var t=calcBranchTotal(me);
      html+='<div class="card"><div class="card-head"><div class="card-title">📍 '+me.name+' 매출 상세</div></div><div class="card-body">'
        +'<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)"><span>직접 매출</span><strong style="color:var(--green)">₩'+parseFloat(me.revenue||0).toLocaleString()+'</strong></div>'
        +'<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)"><span>결제 매출</span><strong style="color:var(--blue)">₩'+(memberRevenue[me.id]||0).toLocaleString()+'</strong></div>'
        +'<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)"><span>회원 수</span><strong>'+(memberCntByBranch[me.id]||0)+'명</strong></div>'
        +'<div style="display:flex;justify-content:space-between;padding:14px 0 4px;border-top:1px solid var(--border);margin-top:6px"><span style="font-weight:700">합계</span><strong style="color:var(--accent);font-size:18px">₩'+t.total.toLocaleString()+'</strong></div>'
        +'</div></div>';
    }
    return html;
  }
  
  // 트리 형태로 표시 (계층별)
  var masters=visBranches.filter(b=>b.type==='master');
  var bls=visBranches.filter(b=>b.type==='branch');
  
  function renderRev(b,depth){
    var t=calcBranchTotal(b);
    var children=branches.filter(x=>x.parent_id===b.id&&(vis===null||vis.indexOf(x.id)>=0));
    var ico={master:'🏢',branch:'🏬',sub:'📍'};
    var lbl={master:'총판',branch:'지사',sub:'지점'};
    var col={master:'var(--c-master)',branch:'var(--c-branch)',sub:'var(--c-sub)'};
    var directRev=parseFloat(b.revenue||0)+(memberRevenue[b.id]||0);
    
    var h='<div class="rv-node" style="margin-left:'+(depth*14)+'px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px">'
      +'<div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:6px">'
        +'<div style="flex:1"><div style="font-weight:700;font-size:13px"><span class="badge bg-'+b.type+'">'+lbl[b.type]+'</span> '+ico[b.type]+' '+b.name+'</div>'
        +'<div style="font-size:10px;color:var(--text2);margin-top:3px">직접 ₩'+directRev.toLocaleString()
        +(children.length>0?' · 산하 ₩'+(t.total-directRev).toLocaleString():'')
        +' · 회원 '+t.memCnt+'명</div></div>'
        +'<div style="text-align:right"><div style="font-size:9px;color:var(--text3)">합계 매출</div><div style="font-size:16px;font-weight:700;color:'+col[b.type]+'">₩'+t.total.toLocaleString()+'</div></div>'
      +'</div></div>';
    
    children.forEach(c=>{h+=renderRev(c,depth+1);});
    return h;
  }
  
  if(role==='dev'||role==='master'){
    masters.forEach(m=>{html+=renderRev(m,0);});
  }else if(role==='branch'){
    bls.forEach(b=>{html+=renderRev(b,0);});
  }
  
  return html;
}

var pendOrgType=null;     // 'master' | 'branch' | 'sub'
var pendOrgParent=null;   // 부모 branch_id (null = 최상위 = 총판)

function openOrgModal(type,parentId){
  pendOrgType=type;
  pendOrgParent=parentId;
  var titles={master:'총판 추가',branch:'지사 추가',sub:'지점 추가'};
  document.getElementById('org-modal-title').textContent=titles[type]||'조직 추가';
  
  // 입력 초기화
  ['mo-name','mo-tg','mo-hours','mo-contact','mo-phone'].forEach(function(id){
    var el=document.getElementById(id);
    if(el)el.value='';
  });
  
  // 부모 조직 선택 표시 여부
  var pw=document.getElementById('parent-wrap');
  var ps=document.getElementById('parent-sel');
  var pl=document.getElementById('parent-label');
  
  if(type==='master'||parentId){
    // 총판이거나 부모가 명시되면 select 숨김
    pw.style.display='none';
  }else{
    // 지사/지점인데 부모 미정 → 사용자가 선택
    pw.style.display='block';
    if(type==='branch'){
      pl.textContent='상위 총판 *';
      var opts='<option value="">총판 선택...</option>';
      // 권한별 선택 가능한 총판
      var availMasters=role==='dev'?branches.filter(b=>b.type==='master'):[];
      availMasters.forEach(m=>{
        opts+='<option value="'+m.id+'">🏢 '+m.name+'</option>';
      });
      ps.innerHTML=opts;
    }else if(type==='sub'){
      pl.textContent='상위 조직 *';
      var opts='<option value="">조직 선택...</option>';
      // 개발자: 모든 총판/지사 가능 / 총판: 자기 산하 지사 + 자기 자신 (직속지점) / 지사: 자기 자신만
      var vis=getVisibleBranchIds();
      var availMasters=branches.filter(b=>b.type==='master'&&(vis===null||vis.indexOf(b.id)>=0));
      var availBranches=branches.filter(b=>b.type==='branch'&&(vis===null||vis.indexOf(b.id)>=0));
      availMasters.forEach(m=>{opts+='<option value="m:'+m.id+'">🏢 '+m.name+' (직속 지점)</option>';});
      availBranches.forEach(b=>{
        var pm=branches.find(x=>x.id===b.parent_id);
        opts+='<option value="b:'+b.id+'"> └ 🏬 '+b.name+(pm?' ['+pm.name+']':'')+'</option>';
      });
      ps.innerHTML=opts;
    }
  }
  document.getElementById('modal-org').classList.add('open');
}

async function saveOrg(){
  var name=document.getElementById('mo-name').value.trim();
  var tg=document.getElementById('mo-tg').value.trim();
  if(!name){showToast('조직명을 입력하세요','error');return;}
  if(!tg){showToast('텔레그램 아이디를 입력하세요','error');return;}
  if(!tg.startsWith('@'))tg='@'+tg;
  
  // 부모 결정
  var parentId=pendOrgParent;
  var actualType=pendOrgType;
  
  // 모달 select 사용 시
  var pw=document.getElementById('parent-wrap');
  if(pw.style.display!=='none'){
    var sv=document.getElementById('parent-sel').value;
    if(!sv){showToast('상위 조직을 선택하세요','error');return;}
    if(pendOrgType==='branch'){
      parentId=parseInt(sv);
    }else if(pendOrgType==='sub'){
      // 'm:N' = 총판 직속 지점, 'b:N' = 지사 산하 지점
      if(sv.startsWith('m:'))parentId=parseInt(sv.substring(2));
      else if(sv.startsWith('b:'))parentId=parseInt(sv.substring(2));
    }
  }
  
  try{
    const payload={
      name:name,
      type:actualType,
      parent_id:parentId,
      telegram_id:tg,
      operating_hours:document.getElementById('mo-hours').value||'10:00~18:00',
      manager_name:document.getElementById('mo-contact').value||'담당자',
      manager_phone:document.getElementById('mo-phone').value||null,
      revenue:0
    };
    const {error}=await sb.from('branches').insert(payload);
    if(error)throw error;
    closeModal('modal-org');
    showToast(({master:'총판',branch:'지사',sub:'지점'}[actualType])+' 추가 완료','success');
    await loadAllData();
    navigate(page);
  }catch(e){
    showToast('추가 실패: '+e.message,'error');
  }
}

async function deleteBranch(id,name){
  if(!confirm('"'+name+'" 조직을 삭제하시겠습니까?\n\n⚠️ 산하 조직과 회원 연결이 모두 끊깁니다.\n이 작업은 되돌릴 수 없습니다.'))return;
  try{
    // 산하 조직도 같이 (CASCADE 로 자동 삭제)
    const {error}=await sb.from('branches').delete().eq('id',id);
    if(error)throw error;
    showToast('조직이 삭제되었습니다','success');
    await loadAllData();
    navigate(page);
  }catch(e){
    showToast('삭제 실패: '+e.message,'error');
  }
}

async function saveAccount(){
  var name=document.getElementById('ca-name').value.trim();
  var uname=document.getElementById('ca-username').value.trim();
  var pw=document.getElementById('ca-password').value;
  var r=document.getElementById('ca-role').value;
  var orgId=document.getElementById('ca-org').value;
  
  if(!name||!uname||!pw){showToast('이름, 아이디, 비밀번호는 필수입니다','error');return;}
  if(pw.length<6){showToast('비밀번호는 6자 이상이어야 합니다','error');return;}
  if(!orgId){showToast('소속 조직을 선택하세요','error');return;}
  if(!/^[a-zA-Z0-9_]+$/.test(uname)){showToast('아이디는 영문/숫자/언더바만 사용 가능합니다','error');return;}
  
  try{
    // 중복 체크
    const {data:existing}=await sb.from('admins').select('id').eq('username',uname).maybeSingle();
    if(existing){showToast('이미 사용 중인 아이디입니다','error');return;}
    
    const hashedPw=await sha256(pw);
    const payload={
      username:uname,
      password:hashedPw,
      name:name,
      role:r,
      branch_id:parseInt(orgId)
    };
    const {error}=await sb.from('admins').insert(payload);
    if(error)throw error;
    closeModal('modal-create-account');
    showToast('어드민 계정 생성 완료: @'+uname,'success');
    navigate('accounts');
  }catch(e){
    showToast('생성 실패: '+e.message,'error');
  }
}

// =====================================================================
//   ORG MANAGE — 지점 관리 (개발자: 전체, 총판: 산하만, 지사: 산하 지점만)
// =====================================================================
function renderOrgManage(){
  // 권한 격리
  var vis=getVisibleBranchIds();
  var visBranches=vis===null?branches:branches.filter(b=>vis.indexOf(b.id)>=0);
  
  // 회원 수 집계 (지점별)
  var memberCountByBranch={};
  members.forEach(m=>{
    if(m.branch_id){
      memberCountByBranch[m.branch_id]=(memberCountByBranch[m.branch_id]||0)+1;
    }
  });
  
  // 트리 구조로 분리
  var masters=visBranches.filter(b=>b.type==='master');
  var branchList=visBranches.filter(b=>b.type==='branch');
  var subs=visBranches.filter(b=>b.type==='sub');
  
  var titleMap={dev:'지점 관리 (전체)',master:'지사/지점 관리',branch:'지점 관리',sub:'내 지점'};
  
  // 헤더 액션 버튼 (권한별)
  var headerActions='';
  if(role==='dev'){
    headerActions='<button class="btn btn-p btn-sm" onclick="openOrgModal(\'master\',null)">+ 총판</button>'
      +'<button class="btn btn-b btn-sm" onclick="openOrgModal(\'branch\',null)">+ 지사</button>'
      +'<button class="btn btn-s btn-sm" onclick="openOrgModal(\'sub\',null)">+ 지점</button>'
      +'<button class="btn btn-g btn-sm" onclick="orgExpandAll(true)">📂 펼치기</button>'
      +'<button class="btn btn-g btn-sm" onclick="orgExpandAll(false)">📁 접기</button>';
  }else if(role==='master'){
    headerActions='<button class="btn btn-b btn-sm" onclick="openOrgModal(\'branch\',null)">+ 지사 (자기 산하)</button>'
      +'<button class="btn btn-s btn-sm" onclick="openOrgModal(\'sub\',null)">+ 지점</button>';
  }else if(role==='branch'){
    headerActions='<button class="btn btn-s btn-sm" onclick="openOrgModal(\'sub\',null)">+ 지점</button>';
  }
  
  var html='<div class="ph"><div><h1>'+(titleMap[role]||'지점 관리')+'</h1><p>총 '+visBranches.length+'개 조직 — 클릭하면 펼쳐집니다</p></div>'
  +(headerActions?'<div style="display:flex;gap:6px;flex-wrap:wrap">'+headerActions+'</div>':'')
  +'</div>';
  
  if(visBranches.length===0){
    html+='<div class="alert a-yellow">⚠️ 등록된 지점이 없습니다.</div>'
    +'<div class="empty"><div class="empty-icon">🏢</div><div class="empty-txt">권한 격리 SQL (setup-permissions.sql) 실행 필요</div></div>';
    return html;
  }
  
  // 산하 회원 수 (자기 + 모든 하위 지점 회원)
  function totalMembers(b){
    var ids=getDescendantBranchIds(b.id);
    return ids.reduce((sum,id)=>sum+(memberCountByBranch[id]||0),0);
  }
  // 산하 매출 합계
  function totalRevenue(b){
    var ids=getDescendantBranchIds(b.id);
    return ids.reduce((sum,id)=>{
      var node=branches.find(x=>x.id===id);
      return sum+(node?parseFloat(node.revenue||0):0);
    },0);
  }
  
  // 노드별 액션 버튼 (권한별)
  function nodeActions(b){
    var actions='';
    if(role==='dev'){
      // 개발자: 모든 노드에 +/삭제 가능
      if(b.type==='master'){
        actions+='<button class="btn btn-b btn-sm" onclick="openOrgModal(\'branch\','+b.id+')">+ 지사</button>';
        actions+='<button class="btn btn-s btn-sm" onclick="openOrgModal(\'sub\','+b.id+')">+ 직속지점</button>';
      }else if(b.type==='branch'){
        actions+='<button class="btn btn-s btn-sm" onclick="openOrgModal(\'sub\','+b.id+')">+ 지점</button>';
      }
      actions+='<button class="btn btn-d btn-sm" onclick="deleteBranch('+b.id+',\''+b.name.replace(/\'/g,'')+'\')">삭제</button>';
    }else if(role==='master'){
      // 총판: 자기 산하만 + 가능
      if(b.type==='master'&&b.id===realBranchId){
        actions+='<button class="btn btn-b btn-sm" onclick="openOrgModal(\'branch\','+b.id+')">+ 지사</button>';
        actions+='<button class="btn btn-s btn-sm" onclick="openOrgModal(\'sub\','+b.id+')">+ 직속지점</button>';
      }else if(b.type==='branch'){
        actions+='<button class="btn btn-s btn-sm" onclick="openOrgModal(\'sub\','+b.id+')">+ 지점</button>';
        actions+='<button class="btn btn-d btn-sm" onclick="deleteBranch('+b.id+',\''+b.name.replace(/\'/g,'')+'\')">삭제</button>';
      }else if(b.type==='sub'){
        actions+='<button class="btn btn-d btn-sm" onclick="deleteBranch('+b.id+',\''+b.name.replace(/\'/g,'')+'\')">삭제</button>';
      }
    }else if(role==='branch'){
      // 지사: 자기 산하 지점만 가능
      if(b.type==='branch'&&b.id===realBranchId){
        actions+='<button class="btn btn-s btn-sm" onclick="openOrgModal(\'sub\','+b.id+')">+ 지점</button>';
      }else if(b.type==='sub'){
        actions+='<button class="btn btn-d btn-sm" onclick="deleteBranch('+b.id+',\''+b.name.replace(/\'/g,'')+'\')">삭제</button>';
      }
    }
    return actions;
  }
  
  // 재귀적 트리 (접기/펼치기 지원)
  function renderTree(b,depth){
    var children=branches.filter(x=>x.parent_id===b.id);
    var visibleChildren=children.filter(c=>vis===null||vis.indexOf(c.id)>=0);
    var ico={master:'🏢',branch:'🏬',sub:'📍'};
    var col={master:'var(--c-master)',branch:'var(--c-branch)',sub:'var(--c-sub)'};
    var bgCol={master:'rgba(240,180,41,.05)',branch:'rgba(52,152,219,.05)',sub:'rgba(46,204,113,.05)'};
    var lbl={master:'총판',branch:'지사',sub:'지점'};
    var hasChildren=visibleChildren.length>0;
    var nodeId='org-'+b.id;
    var memCnt=totalMembers(b);
    var revTotal=totalRevenue(b);
    
    // 펼침 여부 (기본: 첫 레벨만 펼침)
    var defaultOpen=(depth===0);
    
    var h='<div class="oc" style="margin-left:'+(depth*16)+'px;background:'+bgCol[b.type]+'">'
      +'<div class="och" style="cursor:'+(hasChildren?'pointer':'default')+';user-select:none" '
        +(hasChildren?'onclick="toggleOrgNode(\''+nodeId+'\',this)"':'')+'>'
      +'<div style="display:flex;align-items:center;gap:8px;flex:1">'
        +(hasChildren?'<span id="'+nodeId+'-arrow" style="font-size:11px;color:'+col[b.type]+';transition:transform .2s;display:inline-block'+(defaultOpen?';transform:rotate(90deg)':'')+'">▶</span>':'<span style="width:11px;display:inline-block"></span>')
        +'<div class="on2" style="margin:0">'
          +'<span class="badge bg-'+b.type+'">'+lbl[b.type]+'</span> '+ico[b.type]+' '+b.name
          +(b.telegram_id?' <a href="https://t.me/'+b.telegram_id.replace('@','')+'" style="font-size:11px;color:'+col[b.type]+';font-weight:400" onclick="event.stopPropagation()">'+b.telegram_id+'</a>':'')
          +(hasChildren?'<span style="font-size:10px;color:var(--text3);margin-left:6px">('+visibleChildren.length+'개 산하)</span>':'')
          +'<span style="font-size:10px;color:var(--blue);margin-left:6px">👥 회원 '+memCnt+'명</span>'
        +'</div>'
      +'</div>'
      +'<div style="display:flex;gap:4px;flex-wrap:wrap" onclick="event.stopPropagation()">'+nodeActions(b)+'</div>'
      +'</div>'
      +'<div style="padding:0 14px 10px;font-size:11px;color:var(--text3)">담당: '+(b.manager_name||'-')+(b.manager_phone?' / '+b.manager_phone:'')+' · '+(b.operating_hours||'-')+(b.revenue?' · 직접매출 ₩'+parseInt(b.revenue).toLocaleString():'')+(memCnt>0?' · 산하포함 ₩'+revTotal.toLocaleString():'')+'</div>';
    
    if(hasChildren){
      h+='<div id="'+nodeId+'-body" class="ochildren" style="display:'+(defaultOpen?'block':'none')+'">';
      visibleChildren.forEach(c=>{h+=renderTree(c,depth+1);});
      h+='</div>';
    }
    h+='</div>';
    return h;
  }
  
  // 시점별 진입점 결정
  if(role==='dev'){
    masters.forEach(m=>{html+=renderTree(m,0);});
  }else if(role==='master'){
    masters.forEach(m=>{html+=renderTree(m,0);});
  }else if(role==='branch'){
    branchList.forEach(b=>{html+=renderTree(b,0);});
  }else if(role==='sub'){
    subs.forEach(s=>{html+=renderTree(s,0);});
  }
  
  return html;
}

// 노드 접기/펼치기 토글
function toggleOrgNode(nodeId,headerEl){
  var body=document.getElementById(nodeId+'-body');
  var arrow=document.getElementById(nodeId+'-arrow');
  if(!body)return;
  var isOpen=body.style.display!=='none';
  body.style.display=isOpen?'none':'block';
  if(arrow){
    arrow.style.transform=isOpen?'rotate(0deg)':'rotate(90deg)';
  }
}

// 모두 펼치기/접기
function orgExpandAll(expand){
  document.querySelectorAll('[id^="org-"][id$="-body"]').forEach(el=>{
    el.style.display=expand?'block':'none';
  });
  document.querySelectorAll('[id^="org-"][id$="-arrow"]').forEach(el=>{
    el.style.transform=expand?'rotate(90deg)':'rotate(0deg)';
  });
}

// =====================================================================
//   ACCOUNTS — 어드민 계정 관리
// =====================================================================
function renderAccounts(){
  // 권한 격리 — 본인 산하 어드민만
  var html='<div class="ph"><div><h1>어드민 계정 관리</h1><p>로그인 가능한 어드민 계정 목록 — 비밀번호는 SHA256 해시 저장</p></div>'
  +(role==='dev'||role==='master'?'<div><button class="btn btn-p" onclick="openCreateAccount()">+ 계정 생성</button></div>':'')
  +'</div>'
  +'<div class="card" id="acc-card"><div class="card-head"><div class="card-title">계정 목록</div></div><div class="card-body" id="acc-body"><div class="empty"><span class="loading"></span> 로드 중...</div></div></div>';
  setTimeout(loadAccounts,80);
  return html;
}
async function loadAccounts(){
  try{
    const {data,error}=await sb.from('admins').select('*').order('created_at',{ascending:true});
    if(error)throw error;
    var body=document.getElementById('acc-body');
    if(!body)return;
    
    // 권한 격리 — dev 가 아니면 자기와 산하 어드민만
    var visAccounts=data||[];
    if(role!=='dev'){
      var vis=getVisibleBranchIds();
      visAccounts=visAccounts.filter(a=>{
        if(a.role==='dev')return false; // 일반 어드민에게는 dev 계정 안 보여줌
        if(a.id===curAcc.id)return true; // 자기 자신
        if(!a.branch_id)return false;
        return vis&&vis.indexOf(a.branch_id)>=0;
      });
    }
    
    if(!visAccounts.length){
      body.innerHTML='<div class="empty"><div class="empty-icon">🔑</div><div class="empty-txt">표시할 계정 없음</div></div>';
      return;
    }
    
    var rl={dev:'개발자',master:'총판',branch:'지사',sub:'지점'};
    var rcCol={dev:'bg-dev',master:'bg-master',branch:'bg-branch',sub:'bg-sub'};
    
    var html='<div class="tw"><table><thead><tr><th>이름</th><th>아이디</th><th>역할</th><th>소속 지점</th><th>가입일</th><th>관리</th></tr></thead><tbody>';
    visAccounts.forEach(function(a){
      var isMe=(curAcc&&a.id===curAcc.id);
      var branchName='—';
      if(a.branch_id){
        var b=branches.find(x=>x.id===a.branch_id);
        if(b)branchName=b.name;
      }
      html+='<tr'+(isMe?' style="background:rgba(240,180,41,.05)"':'')+'>'
      +'<td style="font-weight:600">'+a.name+(isMe?' <span style="font-size:9px;color:var(--accent);background:rgba(240,180,41,.15);padding:1px 5px;border-radius:3px;margin-left:4px">나</span>':'')+'</td>'
      +'<td style="font-family:monospace;color:var(--accent)">@'+a.username+'</td>'
      +'<td><span class="badge '+(rcCol[a.role]||'bg-gray')+'">'+(rl[a.role]||a.role||'-')+'</span></td>'
      +'<td style="font-size:11px;color:var(--text2)">'+branchName+'</td>'
      +'<td style="font-size:11px;color:var(--text2)">'+isoToFd(a.created_at)+'</td>'
      +'<td>'+(role==='dev'&&!isMe&&a.role!=='dev'?'<button class="btn btn-d btn-sm" onclick="deleteAccount('+a.id+',\''+a.username+'\')">삭제</button>':'<span style="font-size:10px;color:var(--text3)">—</span>')+'</td>'
      +'</tr>';
    });
    html+='</tbody></table></div>';
    body.innerHTML=html;
  }catch(e){
    var body=document.getElementById('acc-body');
    if(body)body.innerHTML='<div class="alert a-red">로드 실패: '+e.message+'</div>';
  }
}
async function deleteAccount(id,username){
  if(!confirm('@'+username+' 어드민 계정을 삭제하시겠습니까?\n\n⚠️ 이 작업은 되돌릴 수 없습니다.'))return;
  try{
    const {error}=await sb.from('admins').delete().eq('id',id);
    if(error)throw error;
    showToast('계정이 삭제되었습니다','success');
    navigate('accounts');
  }catch(e){
    showToast('삭제 실패: '+e.message,'error');
  }
}

// =====================================================================
//   MY SETTINGS — 내 설정 (총판/지사/지점 공통)

function renderMySettings(){
  var rl={master:'총판',branch:'지사',sub:'지점'};
  var html='<div class="ph"><div><h1>내 설정</h1><p>'+rl[role]+' 시점 — 본인 조직 정보 관리</p></div></div>'
  +'<div class="alert a-yellow">💡 현재 시점: <b>'+rl[role]+'</b><br>실제 운영 시 본인 조직의 텔레그램 ID, 운영 시간, 담당자 정보를 관리할 수 있습니다.<br>이 페이지는 branches 테이블 추가 후 완전히 활성화됩니다.</div>'
  +'<div class="ss"><div class="ssh"><div class="ssi" style="background:rgba(41,128,185,.12);color:var(--blue)">🔑</div><div><div class="sst">비밀번호 변경</div><div class="sss">본인 어드민 계정 비밀번호만 변경 가능합니다</div></div></div>'
  +'<div class="fg"><label class="fl">현재 비밀번호</label><input class="fi2" type="password" id="pw-current" placeholder="현재 비밀번호"></div>'
  +'<div class="fg"><label class="fl">새 비밀번호</label><input class="fi2" type="password" id="pw-new" placeholder="6자 이상"></div>'
  +'<div class="fg" style="margin-bottom:12px"><label class="fl">새 비밀번호 확인</label><input class="fi2" type="password" id="pw-confirm" placeholder="새 비밀번호 재입력"></div>'
  +'<button class="btn btn-d" onclick="changePassword()">🔑 비밀번호 변경</button></div>';
  return html;
}
async function changePassword(){
  var cur=document.getElementById('pw-current').value;
  var nw=document.getElementById('pw-new').value;
  var cf=document.getElementById('pw-confirm').value;
  if(!cur||!nw||!cf){showToast('모든 필드를 입력하세요','error');return;}
  if(nw.length<6){showToast('새 비밀번호는 6자 이상이어야 합니다','error');return;}
  if(nw!==cf){showToast('새 비밀번호가 일치하지 않습니다','error');return;}
  if(!curAcc){showToast('계정 정보 없음','error');return;}
  try{
    const curHash=await sha256(cur);
    if(curHash!==curAcc.password){showToast('현재 비밀번호가 올바르지 않습니다','error');return;}
    const newHash=await sha256(nw);
    const {error}=await sb.from('admins').update({password:newHash,updated_at:new Date().toISOString()}).eq('id',curAcc.id);
    if(error)throw error;
    curAcc.password=newHash;
    ['pw-current','pw-new','pw-confirm'].forEach(function(id){var el=document.getElementById(id);if(el)el.value='';});
    showToast('비밀번호가 변경되었습니다','success');
  }catch(e){
    showToast('변경 실패: '+e.message,'error');
  }
}

  var sb_=document.querySelector('.sidebar');
  var ov=document.getElementById('mob-overlay');
  if(!sb_||!ov)return;
  sb_.classList.toggle('mob-open');
  ov.classList.toggle('show');

  if(window.innerWidth<=768 && e.target.closest('.ni')){
    var sb_=document.querySelector('.sidebar');
    var ov=document.getElementById('mob-overlay');
    if(sb_) sb_.classList.remove('mob-open');
    if(ov) ov.classList.remove('show');
  }
});
